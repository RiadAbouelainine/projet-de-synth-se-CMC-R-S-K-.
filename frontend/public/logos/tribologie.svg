<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Deep blue background -->
  <rect width="400" height="400" fill="#1e3b7b" />
  
  <!-- Yellow drop -->
  <!-- Top point at 200, 70. Curves down to a round bottom at 280. -->
  <path d="M 200 60 C 290 150 290 290 200 290 C 110 290 110 150 200 60 Z" fill="#f4af23" />
  
  <!-- Blue T cutout -->
  <!-- Horizontal bar cutting across the drop -->
  <rect x="120" y="160" width="160" height="28" fill="#1e3b7b" />
  <!-- Vertical bar cutting down the middle of the drop -->
  <rect x="180" y="160" width="40" height="140" fill="#1e3b7b" />
  
  <!-- Text -->
  <text x="200" y="350" font-family="Impact, Arial Black, sans-serif" font-weight="900" font-size="44" fill="#f4af23" text-anchor="middle" letter-spacing="4">TRIBOLOGIE</text>
</svg>
